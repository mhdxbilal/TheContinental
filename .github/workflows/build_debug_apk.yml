name: Debug APK

"on":
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:           # lets you trigger a build manually from the Actions tab

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK ───────────────────────────────────────────────────────
      # AGP 8.5 requires JDK 17 minimum.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # ── 3. Normalize line endings + make gradlew executable ──────────
      # sed strips any CRLF that could have been introduced anywhere upstream
      # of this checkout (a phone's browser download, a zip tool, an editor,
      # a future contributor on Windows, etc.) — this makes that entire class
      # of failure impossible regardless of root cause.
      - name: Normalize and prepare gradlew
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          echo "── gradlew diagnostics ──"
          ls -la gradlew
          file gradlew || true
          head -c 64 gradlew | od -c | head -5

      # ── 4. Gradle cache (speeds up subsequent builds significantly) ───
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. Sanity check before the real build — fails fast with a clear
      #       message instead of a confusing "No such file or directory"
      #       three steps later if something upstream ever goes wrong. ────
      - name: Verify project structure
        run: |
          test -f gradlew || { echo "::error::gradlew is missing at repo root"; exit 1; }
          test -x gradlew || { echo "::error::gradlew is not executable"; exit 1; }
          test -f settings.gradle || { echo "::error::settings.gradle is missing"; exit 1; }
          test -f app/build.gradle || { echo "::error::app/build.gradle is missing"; exit 1; }
          test -f app/src/main/AndroidManifest.xml || { echo "::error::AndroidManifest.xml is missing"; exit 1; }
          echo "Project structure OK."

      # ── 6. Assemble debug APK ────────────────────────────────────────
      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dorg.gradle.daemon=false"

      # ── 7. Upload APK artifact ────────────────────────────────────────
      # The APK will appear in the "Artifacts" section of the workflow run
      # in the GitHub Actions UI. Click to download a zip containing the APK.
      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TheContinental-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      # ── 8. Build complete reminder ─────────────────────────────────────
      - name: Build complete
        if: success()
        run: |
          echo "✅ Debug APK built successfully."
          echo "Download it from the 'Artifacts' panel in this workflow run."
          echo "Install via: adb install -r app-debug.apk"
          echo "Or copy to /sdcard/ and install through your file manager."
