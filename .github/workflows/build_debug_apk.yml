name: Debug APK

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:           # lets you trigger a build manually from the Actions tab

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK ───────────────────────────────────────────────────────
      # AGP 8.5 requires JDK 17 minimum.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # ── 3. Gradle wrapper permission ─────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── 4. Gradle cache (speeds up subsequent builds significantly) ───
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. Verify dependencies resolve (catches wrong version strings before
      #       a longer compile step fails with a confusing 404 error) ────────
      - name: Resolve dependencies
        run: ./gradlew dependencies --configuration releaseRuntimeClasspath --no-daemon || \
             ./gradlew dependencies --configuration debugRuntimeClasspath --no-daemon
        continue-on-error: true    # soft failure — the assemble step below will give the real error

      # ── 6. Assemble debug APK ────────────────────────────────────────
      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dorg.gradle.daemon=false"

      # ── 7. Upload APK artifact ────────────────────────────────────────
      # The APK will appear in the "Artifacts" section of the workflow run
      # in the GitHub Actions UI. Click to download a zip containing the APK.
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TheContinental-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── 8. Echo download reminder ─────────────────────────────────────
      - name: Build complete
        run: |
          echo "✅ Debug APK built successfully."
          echo "Download it from the 'Artifacts' panel in this workflow run."
          echo "Install via: adb install -r app-debug.apk"
          echo "Or copy to /sdcard/ and install through your file manager."
